<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jennica Joseph Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #d76481;
      --grey: #5a5a5a;
      --grey-light: #9a9a9a;
      --grey-rule: #e2e2e2;
      --white: #ffffff;
      --off-white: #f9f7f8;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--white);
      color: var(--grey);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 52px;
      border-bottom: 1px solid var(--grey-rule);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
    }

    .logo-link { display: inline-block; text-decoration: none; line-height: 0; }
    .logo-link img { height: 96px; width: auto; display: block; } 

    nav { display: flex; align-items: center; gap: 48px; }

    nav a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      position: relative;
      padding-bottom: 4px;
      transition: color 0.2s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--pink);
    }

    nav a:hover { color: var(--pink); }
    nav a.active { color: var(--pink); }

    .nav-instagram {
      text-decoration: none;
      display: flex;
      align-items: center;
      color: var(--pink);
      line-height: 0;
      transition: opacity 0.2s;
    }
    .nav-instagram:hover { opacity: 0.7; }
    .nav-instagram::after { display: none; }
    .nav-instagram svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── BODY ── */
    .resume-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 40px 72px;
      background: var(--off-white);
      min-height: calc(100vh - 137px);
    }

    
    .resume-img-wrap {
      width: min(860px, 94vw);
      box-shadow: 0 12px 48px rgba(0,0,0,0.13);
      background: var(--white);
    }

    .resume-img-wrap img {
      width: 100%;
      display: block;
    }

    
    .download-btn {
      display: inline-block;
      margin-top: 36px;
      background: none;
      border: 1px solid var(--pink);
      color: var(--pink);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 10px 32px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .download-btn:hover {
      background: var(--pink);
      color: var(--white);
    }

    @media (max-width: 640px) {
      header { padding: 14px 20px; }
      nav { gap: 24px; }
      .logo-link img { height: 68px; } /* matches index.html mobile size */
      .resume-section { padding: 32px 8px 48px; }
      .pdf-wrap embed { height: 600px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-link" aria-label="Jennica Joseph Creative — Home">
      <img src="Logo.svg" alt="Jennica Joseph Creative" />
    </a>
    <nav>
      <a href="bio.html">Bio</a>
      <a href="resume.html" class="active">Resume</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.instagram.com/jennicajosephcreative" target="_blank" rel="noopener noreferrer" class="nav-instagram" aria-label="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
      </a>
    </nav>
  </header>

  <section class="resume-section">

    <div class="resume-img-wrap">
      <img src="resume.png" alt="Jennica Joseph Resume" />
    </div>

    <a class="download-btn" href="resume.pdf" download="JennicaJoseph_Resume.pdf">↓ Download Resume</a>

  </section>

</body>
</html>
