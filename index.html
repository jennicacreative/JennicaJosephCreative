<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jennica Joseph Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #d76481;
      --grey: #5a5a5a;
      --grey-light: #9a9a9a;
      --grey-rule: #e2e2e2;
      --white: #ffffff;
      --off-white: #f9f7f8;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--white);
      color: var(--grey);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 52px;
      border-bottom: 1px solid var(--grey-rule);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
    }

    .logo-link { display: inline-block; text-decoration: none; line-height: 0; }
    .logo-link img { height: 96px; width: auto; display: block; } 

    nav { display: flex; align-items: center; gap: 48px; }

    nav a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      position: relative;
      padding-bottom: 4px;
      transition: color 0.2s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--pink);
    }

    nav a:hover, nav a.active { color: var(--pink); }

    .nav-instagram {
      text-decoration: none;
      display: flex;
      align-items: center;
      color: var(--pink);
      line-height: 0;
      transition: opacity 0.2s;
    }
    .nav-instagram:hover { opacity: 0.7; }
    .nav-instagram::after { display: none; }
    .nav-instagram svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── BODY ── */
    .flipbook-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 40px 60px;
      background: var(--off-white);
      min-height: calc(100vh - 137px); 
    }

    .book-wrapper {
      width: min(1200px, 94vw);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .spread-wrapper {
      width: 100%;
      position: relative;
    }

    .spread {
      width: 100%;
      display: flex;
      position: relative;
      background: var(--white);
      box-shadow: 0 12px 48px rgba(0,0,0,0.13);
    }

    .spread-page {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--white);
    }

    .spread-page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Spine */
    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 4px;
      height: 100%;
      background: linear-gradient(to right,
        rgba(0,0,0,0.10),
        rgba(255,255,255,0.5),
        rgba(0,0,0,0.07));
      z-index: 10;
      pointer-events: none;
    }

    .spread {
      transform-style: preserve-3d;
      perspective: 2400px;
    }

    .spread-inner {
      width: 100%;
      display: flex;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
      transform-origin: center center;
    }

    .spread-inner.flip-forward {
      animation: turnForward 0.7s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    .spread-inner.flip-backward {
      animation: turnBackward 0.7s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    @keyframes turnForward {
      0%   { transform: rotateY(0deg) scaleX(1); opacity: 1; }
      49%  { transform: rotateY(-90deg) scaleX(0.05); opacity: 0.3; }
      50%  { transform: rotateY(90deg) scaleX(0.05); opacity: 0.3; }
      100% { transform: rotateY(0deg) scaleX(1); opacity: 1; }
    }

    @keyframes turnBackward {
      0%   { transform: rotateY(0deg) scaleX(1); opacity: 1; }
      49%  { transform: rotateY(90deg) scaleX(0.05); opacity: 0.3; }
      50%  { transform: rotateY(-90deg) scaleX(0.05); opacity: 0.3; }
      100% { transform: rotateY(0deg) scaleX(1); opacity: 1; }
    }

    .flipbook-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 36px;
    }

    .flip-btn {
      background: none;
      border: 1px solid var(--pink);
      color: var(--pink);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 10px 28px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .flip-btn:hover:not(:disabled) { background: var(--pink); color: var(--white); }
    .flip-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .page-counter {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--grey-light);
      min-width: 100px;
      text-align: center;
      letter-spacing: 0.12em;
    }

    /* ── PAGE JUMP ── */
    .page-jump {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      opacity: 0.65;
      transition: opacity 0.2s;
    }

    .page-jump:hover, .page-jump:focus-within { opacity: 1; }

    .page-jump-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-jump label {
      font-size: 0.48rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-light);
    }

    .page-jump input {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--grey);
      border: 1px solid var(--grey-rule);
      background: var(--white);
      padding: 3px 6px;
      width: 42px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .page-jump input:focus { border-color: var(--pink); }

    .page-jump input::-webkit-inner-spin-button,
    .page-jump input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .page-jump input[type=number] { -moz-appearance: textfield; }

    .page-jump button {
      background: none;
      border: 1px solid var(--pink);
      color: var(--pink);
      font-family: 'Raleway', sans-serif;
      font-size: 0.48rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .page-jump button:hover { background: var(--pink); color: var(--white); }

    .page-jump-error {
      font-size: 0.58rem;
      color: var(--pink);
      letter-spacing: 0.1em;
      margin-top: 4px;
      min-height: 1em;
      text-align: center;
    }

    /* ── FULLSCREEN BUTTON ── */
    .fs-btn {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 50;
      border: 1px solid var(--pink);
      background: rgba(255,255,255,0.88);
      color: var(--pink);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: background 0.2s, color 0.2s;
      padding: 0;
      /* pill shape for expand state */
      border-radius: 20px;
      padding: 6px 12px 6px 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .fs-btn:hover { background: var(--pink); color: var(--white); }
    .fs-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* The close state: more prominent */
    .fs-btn.is-open {
      background: var(--pink);
      color: var(--white);
      border-color: var(--pink);
    }
    .fs-btn.is-open:hover {
      background: #c05572;
      border-color: #c05572;
    }

    @media (max-width: 1024px) {
      .fs-btn { display: flex; }
    }

    /* ── FULLSCREEN STATE ── */
    :fullscreen .flipbook-section,
    :-webkit-full-screen .flipbook-section {
      min-height: 100vh;
      padding: 20px 16px;
      justify-content: center;
    }
    :fullscreen header,
    :-webkit-full-screen header { display: none; }

    body.is-fullscreen { overflow: hidden; }
    body.is-fullscreen header { display: none; }
    body.is-fullscreen .flipbook-section {
      position: fixed;
      inset: 0;
      z-index: 400;
      min-height: 100vh;
      padding: 20px 16px;
      overflow-y: auto;
    }

    @media (max-width: 640px) {
      header { padding: 14px 20px; }
      nav { gap: 24px; }
      .logo-link img { height: 68px; }
      .flipbook-section { padding: 20px 8px 36px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-link" aria-label="Jennica Joseph Creative — Home">
      <img src="Logo.svg" alt="Jennica Joseph Creative" />
    </a>
    <nav>
      <a href="bio.html">Bio</a>
      <a href="resume.html">Resume</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.instagram.com/jennicajosephcreative" target="_blank" rel="noopener noreferrer" class="nav-instagram" aria-label="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
      </a>
    </nav>
  </header>

  <section class="flipbook-section">
    <div class="book-wrapper">

      <div class="spread-wrapper">
        <div class="spread">
          <div class="spread-inner" id="spreadInner">
            <div class="spread-page" id="pageLeft">
              <img id="imgLeft" src="" alt="" />
            </div>
            <div class="spread-page" id="pageRight">
              <img id="imgRight" src="" alt="" />
            </div>
          </div>
          <div class="spine"></div>
        </div>

        <button class="fs-btn" id="fsBtn" aria-label="Toggle fullscreen">
          <!-- expand state -->
          <svg id="fsIcon" viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          <span id="fsLabel">Full screen</span>
        </button>
      </div>

      <div class="flipbook-controls">
        <button class="flip-btn" id="prevBtn">← Prev</button>
        <span class="page-counter" id="pageCounter"></span>
        <button class="flip-btn" id="nextBtn">Next →</button>
      </div>

      <div class="page-jump">
        <label for="pageJumpInput">Go to page</label>
        <div class="page-jump-row">
          <input
            type="number"
            id="pageJumpInput"
            min="1"
            max="42"
            placeholder="—"
            aria-label="Enter page number"
          />
          <button id="pageJumpBtn">Go</button>
        </div>
      </div>
      <div class="page-jump-error" id="pageJumpError" aria-live="polite"></div>

    </div>
  </section>

  <script>
    const PAGES = [
      'images/Page1.jpg',
      'images/Page2.jpg',
      'images/Page3.jpg',
      'images/Page4.jpg',
      'images/Page5.jpg',
      'images/Page6.jpg',
      'images/Page7.jpg',
      'images/Page8.jpg',
      'images/Page9.jpg',
      'images/Page10.jpg',
      'images/Page11.jpg',
      'images/Page12.jpg',
      'images/Page13.jpg',
      'images/Page14.jpg',
      'images/Page15.jpg',
      'images/Page16.jpg',
      'images/Page17.jpg',
      'images/Page18.jpg',
      'images/Page19.jpg',
      'images/Page20.jpg',
      'images/Page21.jpg',
      'images/Page22.jpg',
      'images/Page23.jpg',
      'images/Page24.jpg',
      'images/Page25.jpg',
      'images/Page26.jpg',
      'images/Page27.jpg',
      'images/Page28.jpg',
      'images/Page29.jpg',
      'images/Page30.jpg',
      'images/Page31.jpg',
      'images/Page32.jpg',
      'images/Page33.jpg',
      'images/Page34.jpg',
      'images/Page35.jpg',
      'images/Page36.jpg',
      'images/Page37.jpg',
      'images/Page38.jpg',
      'images/Page39.jpg',
      'images/Page40.jpg',
      'images/Page41.jpg',
      'images/Page42.jpg',
    ];

    const spreads = [];
    for (let i = 0; i < PAGES.length; i += 2) {
      spreads.push([PAGES[i], PAGES[i + 1] || null]);
    }

    const totalSpreads = spreads.length;
    let current   = 0;
    let animating = false;

    const spreadInner  = document.getElementById('spreadInner');
    const imgLeft      = document.getElementById('imgLeft');
    const imgRight     = document.getElementById('imgRight');
    const prevBtn      = document.getElementById('prevBtn');
    const nextBtn      = document.getElementById('nextBtn');
    const counter      = document.getElementById('pageCounter');
    const jumpInput    = document.getElementById('pageJumpInput');
    const jumpBtn      = document.getElementById('pageJumpBtn');
    const jumpError    = document.getElementById('pageJumpError');
    const fsBtn        = document.getElementById('fsBtn');
    const fsIcon       = document.getElementById('fsIcon');
    const fsLabel      = document.getElementById('fsLabel');

    // expand icon path data
    const ICON_EXPAND   = 'expand';
    const ICON_COLLAPSE = 'collapse';

    function showSpread(index) {
      const [l, r] = spreads[index];
      imgLeft.src  = l || '';
      imgRight.src = r || '';
      imgRight.style.visibility = r ? 'visible' : 'hidden';
      const leftPage  = index * 2 + 1;
      const rightPage = Math.min(index * 2 + 2, PAGES.length);
      counter.textContent = leftPage + ' \u2013 ' + rightPage + '  /  ' + PAGES.length;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === totalSpreads - 1;
    }

    function flip(direction) {
      if (animating) return;
      if (direction === 'forward'  && current >= totalSpreads - 1) return;
      if (direction === 'backward' && current <= 0) return;

      animating = true;
      prevBtn.disabled = true;
      nextBtn.disabled = true;

      const animClass = direction === 'forward' ? 'flip-forward' : 'flip-backward';
      spreadInner.classList.add(animClass);

      setTimeout(() => {
        if (direction === 'forward') current++;
        else current--;
        showSpread(current);
      }, 350);

      setTimeout(() => {
        spreadInner.classList.remove(animClass);
        animating = false;
        prevBtn.disabled = current === 0;
        nextBtn.disabled = current === totalSpreads - 1;
      }, 720);
    }

    function jumpToPage() {
      const raw = parseInt(jumpInput.value, 10);
      jumpError.textContent = '';

      if (isNaN(raw) || raw < 1 || raw > PAGES.length) {
        jumpError.textContent = 'Please enter a page number between 1 and ' + PAGES.length + '.';
        jumpInput.focus();
        return;
      }

      const targetSpread = Math.floor((raw - 1) / 2);

      if (targetSpread === current) {
        jumpInput.value = '';
        return;
      }

      const direction = targetSpread > current ? 'forward' : 'backward';

      if (animating) return;
      animating = true;
      prevBtn.disabled = true;
      nextBtn.disabled = true;

      spreadInner.classList.add(direction === 'forward' ? 'flip-forward' : 'flip-backward');

      setTimeout(() => {
        current = targetSpread;
        showSpread(current);
      }, 350);

      setTimeout(() => {
        spreadInner.classList.remove('flip-forward');
        spreadInner.classList.remove('flip-backward');
        animating = false;
        prevBtn.disabled = current === 0;
        nextBtn.disabled = current === totalSpreads - 1;
      }, 720);

      jumpInput.value = '';
    }

    nextBtn.addEventListener('click', () => flip('forward'));
    prevBtn.addEventListener('click', () => flip('backward'));

    jumpBtn.addEventListener('click', jumpToPage);
    jumpInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') jumpToPage();
    });

    document.addEventListener('keydown', (e) => {
      if (document.activeElement === jumpInput) return;
      if (e.key === 'ArrowRight') flip('forward');
      if (e.key === 'ArrowLeft')  flip('backward');
    });

    /* ── FULLSCREEN ── */
    let cssFs = false;

    function setOpen(active) {
      fsBtn.classList.toggle('is-open', active);
      fsLabel.textContent = active ? '✕  Close' : 'Full screen';
      // swap icon
      fsIcon.innerHTML = active
        ? '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
        : '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
    }

    function enterFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) {
        el.requestFullscreen().catch(() => enableCssFs());
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      } else {
        enableCssFs();
      }
    }

    function exitFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      } else {
        disableCssFs();
      }
    }

    function enableCssFs() {
      cssFs = true;
      document.body.classList.add('is-fullscreen');
      setOpen(true);
    }

    function disableCssFs() {
      cssFs = false;
      document.body.classList.remove('is-fullscreen');
      setOpen(false);
    }

    fsBtn.addEventListener('click', () => {
      const inNativeFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (inNativeFs || cssFs) {
        exitFullscreen();
      } else {
        enterFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      setOpen(!!document.fullscreenElement);
    });
    document.addEventListener('webkitfullscreenchange', () => {
      setOpen(!!document.webkitFullscreenElement);
    });

    showSpread(0);
  </script>

</body>
</html>
