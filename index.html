<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jennica Joseph Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #d76481;
      --grey: #5a5a5a;
      --grey-light: #9a9a9a;
      --grey-rule: #e2e2e2;
      --white: #ffffff;
      --off-white: #f9f7f8;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--white);
      color: var(--grey);
      min-height: 100vh;
    }

    /* ── HEADER — not sticky ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 52px;
      border-bottom: 1px solid var(--grey-rule);
      background: var(--white);
    }

    .logo-link { display: inline-block; text-decoration: none; line-height: 0; }
    .logo-link img { height: 96px; width: auto; display: block; }

    nav { display: flex; align-items: center; gap: 48px; }

    nav a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      position: relative;
      padding-bottom: 4px;
      transition: color 0.2s;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--pink);
    }
    nav a:hover, nav a.active { color: var(--pink); }

    .nav-instagram {
      text-decoration: none;
      display: flex;
      align-items: center;
      color: var(--pink);
      line-height: 0;
      transition: opacity 0.2s;
    }
    .nav-instagram:hover { opacity: 0.7; }
    .nav-instagram::after { display: none; }
    .nav-instagram svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 1.6;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── FLIPBOOK SECTION ── */
    .flipbook-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 40px 60px;
      background: var(--off-white);
    }

    .book-wrapper {
      width: min(1200px, 94vw);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .spread {
      width: 100%;
      display: flex;
      position: relative;
      background: var(--white);
      box-shadow: 0 12px 48px rgba(0,0,0,0.13);
      perspective: 2400px;
    }

    .spread-inner {
      width: 100%;
      display: flex;
      transform-style: preserve-3d;
      transform-origin: center center;
    }

    .spread-page {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--white);
    }

    .spread-page img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .spine {
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 4px; height: 100%;
      background: linear-gradient(to right,
        rgba(0,0,0,0.10),
        rgba(255,255,255,0.5),
        rgba(0,0,0,0.07));
      z-index: 10;
      pointer-events: none;
    }

    .spread-inner.flip-forward {
      animation: turnForward 0.7s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }
    .spread-inner.flip-backward {
      animation: turnBackward 0.7s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    @keyframes turnForward {
      0%   { transform: rotateY(0deg) scaleX(1); opacity: 1; }
      49%  { transform: rotateY(-90deg) scaleX(0.05); opacity: 0.3; }
      50%  { transform: rotateY(90deg) scaleX(0.05); opacity: 0.3; }
      100% { transform: rotateY(0deg) scaleX(1); opacity: 1; }
    }
    @keyframes turnBackward {
      0%   { transform: rotateY(0deg) scaleX(1); opacity: 1; }
      49%  { transform: rotateY(90deg) scaleX(0.05); opacity: 0.3; }
      50%  { transform: rotateY(-90deg) scaleX(0.05); opacity: 0.3; }
      100% { transform: rotateY(0deg) scaleX(1); opacity: 1; }
    }

    /* ── CONTROLS desktop / portrait ── */
    .flipbook-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 36px;
    }

    .flip-btn {
      background: none;
      border: 1px solid var(--pink);
      color: var(--pink);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 10px 28px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .flip-btn:hover:not(:disabled) { background: var(--pink); color: var(--white); }
    .flip-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .page-counter {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--grey-light);
      min-width: 100px;
      text-align: center;
      letter-spacing: 0.12em;
    }

    /* ── PAGE JUMP ── */
    .page-jump {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .page-jump:hover, .page-jump:focus-within { opacity: 1; }
    .page-jump-row { display: flex; align-items: center; gap: 6px; }

    .page-jump label {
      font-size: 0.48rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-light);
    }

    .page-jump input {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--grey);
      border: 1px solid var(--grey-rule);
      background: var(--white);
      padding: 3px 6px;
      width: 42px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .page-jump input:focus { border-color: var(--pink); }
    .page-jump input::-webkit-inner-spin-button,
    .page-jump input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .page-jump input[type=number] { -moz-appearance: textfield; }

    .page-jump button {
      background: none;
      border: 1px solid var(--pink);
      color: var(--pink);
      font-family: 'Raleway', sans-serif;
      font-size: 0.48rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .page-jump button:hover { background: var(--pink); color: var(--white); }

    .page-jump-error {
      font-size: 0.58rem;
      color: var(--pink);
      letter-spacing: 0.1em;
      margin-top: 4px;
      min-height: 1em;
      text-align: center;
    }

    /* ══════════════════════════════════════════
       PORTRAIT MOBILE  ≤ 640px
    ══════════════════════════════════════════ */
    @media (max-width: 640px) and (orientation: portrait) {
      header { padding: 10px 16px; }
      .logo-link img { height: 52px; }
      nav { gap: 18px; }
      nav a { font-size: 0.62rem; letter-spacing: 0.18em; }

      .flipbook-section { padding: 12px 6px 24px; }
      .book-wrapper { width: 100%; }

      .flipbook-controls { gap: 12px; margin-top: 16px; }

      .flip-btn {
        padding: 0;
        width: 32px; height: 32px;
        border-radius: 50%;
        font-size: 0; letter-spacing: 0;
        display: flex; align-items: center; justify-content: center;
      }
      #prevBtn::before {
        content: '';
        display: block;
        width: 8px; height: 8px;
        border-left: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: rotate(45deg) translateX(1px);
      }
      #nextBtn::after {
        content: '';
        display: block;
        width: 8px; height: 8px;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: rotate(-45deg) translateX(-1px);
      }

      .page-counter { font-size: 0.7rem; min-width: 80px; }
      .page-jump { margin-top: 8px; }
    }

    /* ══════════════════════════════════════════
       LANDSCAPE FULLSCREEN VIEWER
    ══════════════════════════════════════════ */

    /* Hide normal UI when landscape-active */
    body.landscape-active > header,
    body.landscape-active > .flipbook-section { display: none; }

    /* Fullscreen book */
    #landscape-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      z-index: 9000;
      align-items: stretch;
      justify-content: stretch;
    }
    body.landscape-active #landscape-viewer { display: flex; }

    #landscape-spread {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      perspective: 2400px;
      overflow: hidden;
    }

    #landscape-inner {
      width: 100%;
      height: 100%;
      display: flex;
      transform-style: preserve-3d;
      transform-origin: center center;
    }

    #landscape-inner.flip-forward {
      animation: turnForward 0.7s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }
    #landscape-inner.flip-backward {
      animation: turnBackward 0.7s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    .ls-page {
      width: 50%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }
    .ls-page img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    #landscape-spine {
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 3px; height: 100%;
      background: linear-gradient(to right,
        rgba(0,0,0,0.18),
        rgba(255,255,255,0.55),
        rgba(0,0,0,0.12));
      z-index: 10;
      pointer-events: none;
    }

    /* ── Overlay controls ── */
    #landscape-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 9100;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 12px 24px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      transition: opacity 0.35s ease;
    }
    body.landscape-active #landscape-controls { display: flex; }
    #landscape-controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Circle nav buttons */
    .ls-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.1);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ls-btn:hover:not(:disabled) {
      background: rgba(215,100,129,0.65);
      border-color: var(--pink);
    }
    .ls-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .ls-btn svg {
      width: 11px; height: 11px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    #ls-counter {
      font-family: 'Raleway', sans-serif;
      font-size: 0.63rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.85);
      min-width: 84px;
      text-align: center;
    }



    /* Tap hint */
    #ls-tap-hint {
      position: fixed;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 9050;
      display: none;
      font-family: 'Raleway', sans-serif;
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      transition: opacity 0.5s;
      white-space: nowrap;
    }
    body.landscape-active #ls-tap-hint { display: block; }
    #ls-tap-hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <!-- Normal portrait / desktop header -->
  <header>
    <a href="index.html" class="logo-link" aria-label="Jennica Joseph Creative — Home">
      <img src="Logo.svg" alt="Jennica Joseph Creative" />
    </a>
    <nav>
      <a href="bio.html">Bio</a>
      <a href="resume.html">Resume</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.instagram.com/jennicajosephcreative" target="_blank" rel="noopener noreferrer" class="nav-instagram" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
      </a>
    </nav>
  </header>

  <!-- Normal portrait / desktop flipbook -->
  <section class="flipbook-section">
    <div class="book-wrapper">
      <div class="spread">
        <div class="spread-inner" id="spreadInner">
          <div class="spread-page"><img id="imgLeft" src="" alt="" /></div>
          <div class="spread-page"><img id="imgRight" src="" alt="" /></div>
        </div>
        <div class="spine"></div>
      </div>

      <div class="flipbook-controls">
        <button class="flip-btn" id="prevBtn">← Prev</button>
        <span class="page-counter" id="pageCounter"></span>
        <button class="flip-btn" id="nextBtn">Next →</button>
      </div>

      <div class="page-jump">
        <label for="pageJumpInput">Go to page</label>
        <div class="page-jump-row">
          <input type="number" id="pageJumpInput" min="1" max="42" placeholder="—" aria-label="Enter page number" />
          <button id="pageJumpBtn">Go</button>
        </div>
      </div>
      <div class="page-jump-error" id="pageJumpError" aria-live="polite"></div>
    </div>
  </section>

  <!-- ── Landscape fullscreen viewer ── -->
  <div id="landscape-viewer">
    <div id="landscape-spread">
      <div id="landscape-inner">
        <div class="ls-page"><img id="ls-imgLeft" src="" alt="" /></div>
        <div class="ls-page"><img id="ls-imgRight" src="" alt="" /></div>
      </div>
      <div id="landscape-spine"></div>
    </div>
  </div>

  <!-- Landscape overlay controls -->
  <div id="landscape-controls">
    <button class="ls-btn" id="ls-prevBtn" aria-label="Previous">
      <svg viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10"/></svg>
    </button>
    <span id="ls-counter"></span>
    <button class="ls-btn" id="ls-nextBtn" aria-label="Next">
      <svg viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10"/></svg>
    </button>
  </div>

  <div id="ls-tap-hint">swipe or tap edges to turn &nbsp;·&nbsp; tap center for controls</div>

  <script>
    const PAGES = [
      'images/Page1.jpg','images/Page2.jpg','images/Page3.jpg','images/Page4.jpg',
      'images/Page5.jpg','images/Page6.jpg','images/Page7.jpg','images/Page8.jpg',
      'images/Page9.jpg','images/Page10.jpg','images/Page11.jpg','images/Page12.jpg',
      'images/Page13.jpg','images/Page14.jpg','images/Page15.jpg','images/Page16.jpg',
      'images/Page17.jpg','images/Page18.jpg','images/Page19.jpg','images/Page20.jpg',
      'images/Page21.jpg','images/Page22.jpg','images/Page23.jpg','images/Page24.jpg',
      'images/Page25.jpg','images/Page26.jpg','images/Page27.jpg','images/Page28.jpg',
      'images/Page29.jpg','images/Page30.jpg','images/Page31.jpg','images/Page32.jpg',
      'images/Page33.jpg','images/Page34.jpg','images/Page35.jpg','images/Page36.jpg',
      'images/Page37.jpg','images/Page38.jpg','images/Page39.jpg','images/Page40.jpg',
      'images/Page41.jpg','images/Page42.jpg',
    ];

    const spreads = [];
    for (let i = 0; i < PAGES.length; i += 2) spreads.push([PAGES[i], PAGES[i+1] || null]);
    const totalSpreads = spreads.length;

    let current = 0;
    let animating = false;

    // Portrait / desktop
    const spreadInner = document.getElementById('spreadInner');
    const imgLeft     = document.getElementById('imgLeft');
    const imgRight    = document.getElementById('imgRight');
    const prevBtn     = document.getElementById('prevBtn');
    const nextBtn     = document.getElementById('nextBtn');
    const counter     = document.getElementById('pageCounter');
    const jumpInput   = document.getElementById('pageJumpInput');
    const jumpBtn     = document.getElementById('pageJumpBtn');
    const jumpError   = document.getElementById('pageJumpError');

    // Landscape
    const lsViewer    = document.getElementById('landscape-viewer');
    const lsControls  = document.getElementById('landscape-controls');
    const lsInner     = document.getElementById('landscape-inner');
    const lsImgLeft   = document.getElementById('ls-imgLeft');
    const lsImgRight  = document.getElementById('ls-imgRight');
    const lsPrevBtn   = document.getElementById('ls-prevBtn');
    const lsNextBtn   = document.getElementById('ls-nextBtn');
    const lsCounter   = document.getElementById('ls-counter');

    const lsTapHint   = document.getElementById('ls-tap-hint');

    function isLandscapeMobile() {
      return window.innerHeight <= 600 && window.innerWidth > window.innerHeight;
    }

    function showSpread(index) {
      const [l, r] = spreads[index];

      imgLeft.src  = l || '';
      imgRight.src = r || '';
      imgRight.style.visibility = r ? 'visible' : 'hidden';

      lsImgLeft.src  = l || '';
      lsImgRight.src = r || '';
      lsImgRight.style.visibility = r ? 'visible' : 'hidden';

      const lp = index * 2 + 1;
      const rp = Math.min(index * 2 + 2, PAGES.length);
      const label = lp + ' \u2013 ' + rp + ' / ' + PAGES.length;
      counter.textContent  = label;
      lsCounter.textContent = label;

      prevBtn.disabled   = index === 0;
      nextBtn.disabled   = index === totalSpreads - 1;
      lsPrevBtn.disabled = index === 0;
      lsNextBtn.disabled = index === totalSpreads - 1;
    }

    function flip(direction) {
      if (animating) return;
      if (direction === 'forward'  && current >= totalSpreads - 1) return;
      if (direction === 'backward' && current <= 0) return;

      animating = true;
      const cls = direction === 'forward' ? 'flip-forward' : 'flip-backward';
      spreadInner.classList.add(cls);
      lsInner.classList.add(cls);

      setTimeout(() => {
        if (direction === 'forward') current++;
        else current--;
        showSpread(current);
      }, 350);

      setTimeout(() => {
        spreadInner.classList.remove(cls);
        lsInner.classList.remove(cls);
        animating = false;
      }, 720);
    }

    function jumpToPage(inputEl, errorEl) {
      const raw = parseInt(inputEl.value, 10);
      if (errorEl) errorEl.textContent = '';

      if (isNaN(raw) || raw < 1 || raw > PAGES.length) {
        if (errorEl) errorEl.textContent = 'Enter 1\u2013' + PAGES.length + '.';
        return;
      }

      const targetSpread = Math.floor((raw - 1) / 2);
      if (targetSpread === current) { inputEl.value = ''; return; }
      if (animating) return;

      animating = true;
      const cls = targetSpread > current ? 'flip-forward' : 'flip-backward';
      spreadInner.classList.add(cls);
      lsInner.classList.add(cls);

      setTimeout(() => { current = targetSpread; showSpread(current); }, 350);
      setTimeout(() => {
        spreadInner.classList.remove('flip-forward', 'flip-backward');
        lsInner.classList.remove('flip-forward', 'flip-backward');
        animating = false;
      }, 720);

      inputEl.value = '';
    }

    // ── Landscape controls auto-hide ──
    let hideTimer = null;

    function showControls() {
      lsControls.classList.remove('hidden');
      lsTapHint.classList.add('hidden');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(hideControls, 3000);
    }

    function hideControls() {
      lsControls.classList.add('hidden');
      lsTapHint.classList.remove('hidden');
    }

    // Keep controls alive while using the jump input
    lsJumpInput.addEventListener('focus', () => { clearTimeout(hideTimer); lsControls.classList.remove('hidden'); });
    lsJumpInput.addEventListener('blur',  showControls);

    // ── Swipe + zone-tap on the landscape viewer ──
    // Left third  → prev | Right third → next | Center third → toggle controls
    // A move > SWIPE_THRESHOLD is treated as a swipe regardless of zone.
    const SWIPE_THRESHOLD = 40; // px
    let touchStartX = null;
    let touchStartY = null;
    let didSwipe    = false;

    lsViewer.addEventListener('touchstart', (e) => {
      if (e.target.closest('#landscape-controls')) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      didSwipe    = false;
    }, { passive: true });

    lsViewer.addEventListener('touchmove', (e) => {
      if (touchStartX === null) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
        didSwipe = true;
      }
    }, { passive: true });

    lsViewer.addEventListener('touchend', (e) => {
      if (e.target.closest('#landscape-controls')) return;
      if (touchStartX === null) return;

      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      touchStartX = touchStartY = null;

      // Swipe gesture (horizontal, dominant axis)
      if (didSwipe && Math.abs(dx) > Math.abs(dy)) {
        didSwipe = false;
        if (dx < 0) { showControls(); flip('forward');  }  // swipe left  → next
        else         { showControls(); flip('backward'); }  // swipe right → prev
        return;
      }
      didSwipe = false;

      // Zone tap
      const zone = e.changedTouches[0].clientX / window.innerWidth;
      if (zone < 0.3) {
        // Left zone → prev
        showControls();
        flip('backward');
      } else if (zone > 0.7) {
        // Right zone → next
        showControls();
        flip('forward');
      } else {
        // Center zone → toggle controls
        if (lsControls.classList.contains('hidden')) showControls();
        else hideControls();
      }
    }, { passive: true });

    // ── Layout switch ──
    function applyLayout() {
      if (isLandscapeMobile()) {
        document.body.classList.add('landscape-active');
        showControls();
      } else {
        document.body.classList.remove('landscape-active');
        clearTimeout(hideTimer);
        lsControls.classList.remove('hidden');
        lsTapHint.classList.remove('hidden');
      }
    }

    // ── Wiring ──
    prevBtn.addEventListener('click', () => flip('backward'));
    nextBtn.addEventListener('click', () => flip('forward'));
    jumpBtn.addEventListener('click', () => jumpToPage(jumpInput, jumpError));
    jumpInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') jumpToPage(jumpInput, jumpError); });

    lsPrevBtn.addEventListener('click', () => { showControls(); flip('backward'); });
    lsNextBtn.addEventListener('click', () => { showControls(); flip('forward'); });

    document.addEventListener('keydown', (e) => {
      if (document.activeElement === jumpInput || document.activeElement === lsJumpInput) return;
      if (e.key === 'ArrowRight') flip('forward');
      if (e.key === 'ArrowLeft')  flip('backward');
    });

    window.addEventListener('resize', applyLayout);
    window.addEventListener('orientationchange', () => setTimeout(applyLayout, 150));

    showSpread(0);
    applyLayout();
  </script>

</body>
</html>
