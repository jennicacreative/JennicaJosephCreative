<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Jennica Joseph Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #d76481;
      --grey: #5a5a5a;
      --grey-light: #9a9a9a;
      --grey-rule: #e2e2e2;
      --white: #ffffff;
      --off-white: #f9f7f8;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--white);
      color: var(--grey);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 52px;
      border-bottom: 1px solid var(--grey-rule);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
    }

    .logo-link { display: inline-block; text-decoration: none; line-height: 0; }
    .logo-link img { height: 96px; width: auto; display: block; }

    nav { display: flex; align-items: center; gap: 48px; }

    nav a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey);
      position: relative;
      padding-bottom: 4px;
      transition: color 0.2s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--pink);
    }

    nav a:hover { color: var(--pink); }
    nav a.active { color: var(--pink); }
    
    /* ── CONTACT SECTION ── */
    .contact-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 113px);
      padding: 72px 40px;
      background: var(--off-white);
    }

    .contact-inner {
      width: min(560px, 94vw);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── THANK YOU NOTE ── */
    .contact-note {
      text-align: center;
      margin-bottom: 48px;
    }

    .contact-note p {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.9;
      color: var(--pink);
      letter-spacing: 0.02em;
    }

    /* ── FORM ── */
    .contact-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-row {
      display: flex;
      gap: 20px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 8px;
    }

    .form-field label {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--grey-light);
    }

    .form-field input,
    .form-field textarea {
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--grey);
      background: var(--white);
      border: 1px solid var(--grey-rule);
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--pink);
    }

    .form-field textarea {
      resize: vertical;
      min-height: 140px;
    }

    /* ── SEND BUTTON ── */
    .send-btn {
      align-self: center;
      margin-top: 8px;
      background: var(--pink);
      border: 1px solid var(--pink);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 12px 48px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .send-btn:hover {
      background: var(--white);
      color: var(--pink);
    }

    /* ── SUCCESS MESSAGE ── */
    .success-msg {
      display: none;
      text-align: center;
      margin-top: 28px;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--pink);
      letter-spacing: 0.08em;
    }

    @media (max-width: 640px) {
      header { padding: 14px 20px; }
      nav { gap: 24px; }
      .logo-link img { height: 52px; }
      .contact-section { padding: 40px 24px; }
      .form-row { flex-direction: column; gap: 20px; }
    }
  
    .nav-instagram { text-decoration: none;
      display: flex;
      align-items: center;
      color: var(--pink);
      line-height: 0;
      transition: opacity 0.2s;
    }
    .nav-instagram:hover { opacity: 0.7; }
    .nav-instagram::after { display: none; }
    .nav-instagram svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-link" aria-label="Jennica Joseph Creative — Home">
      <img src="Logo.svg" alt="Jennica Joseph Creative" />
    </a>
    <nav>
      <a href="bio.html">Bio</a>
      <a href="resume.html">Resume</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="https://www.instagram.com/jennicajosephcreative" target="_blank" rel="noopener noreferrer" class="nav-instagram" aria-label="Instagram"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg></a>
    </nav>
  </header>

  <section class="contact-section">
    <div class="contact-inner">

      <div class="contact-note">
        <p>Thank you for checking out my work!<br />I look forward to creating together soon!<br />Shoot me a message here...</p>
      </div>

      <!-- Replace YOUR_FORM_ID with the ID from Formspree -->
      <form
        class="contact-form"
        action="https://formspree.io/f/xaqvblay"
        method="POST"
        id="contactForm"
      >
        <div class="form-row">
          <div class="form-field">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Jane Smith" required />
          </div>
          <div class="form-field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" />
          </div>
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required />
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Message..." required></textarea>
        </div>

        <button type="submit" class="send-btn">Send Message</button>
      </form>

      <p class="success-msg" id="successMsg">✓ Message sent! I'll be in touch soon.</p>

    </div>
  </section>

  <script>
    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        form.reset();
        form.style.display = 'none';
        successMsg.style.display = 'block';
      }
    });
  </script>

</body>
</html>
